<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北海道親子自駕 2026 — V1 熱門 ＋ V2 秘境</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #f5f5f5;
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    header {
      color: white; padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.4s ease;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    header p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

    .version-toggle {
      display: flex; gap: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px; padding: 3px;
    }
    .ver-btn {
      border: none; border-radius: 16px; padding: 5px 16px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      background: transparent; color: rgba(255,255,255,0.7);
      transition: all .25s; white-space: nowrap;
      touch-action: manipulation;
    }
    .ver-btn.active { background: white; }
    .ver-btn:not(.active):hover { color: white; background: rgba(255,255,255,0.15); }

    .header-badges { display: flex; gap: 6px; }
    .badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; font-size: 11px; white-space: nowrap; }

    .main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 320px; min-width: 290px;
      background: #fff; overflow-y: auto;
      border-right: 1px solid #ddd;
      display: flex; flex-direction: column;
    }

    .filter-bar {
      padding: 8px 10px; background: #f8f8f8;
      border-bottom: 1px solid #eee;
      display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0;
    }
    .filter-bar button {
      border: none; border-radius: 20px; padding: 5px 12px;
      font-size: 12px; cursor: pointer; font-weight: 700;
      opacity: 0.45; transition: opacity .2s, transform .1s;
      touch-action: manipulation;
    }
    .filter-bar button.active { opacity: 1; transform: scale(1.08); box-shadow: 0 2px 6px rgba(0,0,0,0.25); }

    .hotel-change {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; font-size: 11px; font-weight: 600;
      border-bottom: 1px solid #eee;
    }
    .hotel-change.h1       { background: #fdecea; color: #c0392b; }
    .hotel-change.h2       { background: #f3e9f7; color: #6c3483; }
    .hotel-change.h3       { background: #e0f2f1; color: #00695c; }
    .hotel-change.transfer { background: #fff8e1; color: #b45309; }

    .day-block { border-bottom: 1px solid #eee; }
    .day-header {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 13px; cursor: pointer; transition: background .15s;
      min-height: 48px;
    }
    .day-header:hover { background: #f5f5f5; }
    .day-badge {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 12px; flex-shrink: 0;
    }
    .day-title { flex: 1; }
    .day-title strong { font-size: 13px; display: block; }
    .day-title span    { font-size: 11px; color: #777; }
    .spot-count {
      font-size: 10px; font-weight: 700; color: #fff;
      background: #95a5a6; border-radius: 10px; padding: 2px 8px;
      flex-shrink: 0; white-space: nowrap;
    }
    .day-chevron { font-size: 12px; color: #aaa; transition: transform .2s; padding: 8px; }
    .day-block.open .day-chevron { transform: rotate(90deg); }

    .day-spots { display: none; padding: 5px 9px 10px; }
    .day-block.open .day-spots { display: block; }

    .spot-card {
      border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
      cursor: pointer; border: 1px solid #eee; border-left-width: 3px;
      transition: box-shadow .15s; background: #fafafa;
      touch-action: manipulation;
    }
    .spot-card:active { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .spot-card h4 { font-size: 13px; margin-bottom: 4px; }
    .spot-card p  { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 6px; }

    .warn   { font-size: 11px; color: #c0392b; background: #fef0ef; border-radius: 4px; padding: 4px 7px; margin-bottom: 6px; display: inline-block; }
    .pair   { font-size: 11px; color: #1e8449; background: #eafaf1; border-radius: 4px; padding: 4px 7px; margin-bottom: 6px; display: inline-block; }
    .secret { font-size: 11px; color: #7d3c98; background: #f5eef8; border-radius: 4px; padding: 4px 7px; margin-bottom: 6px; display: inline-block; }

    .yt-links { display: flex; flex-direction: column; gap: 5px; }
    .yt-link {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #cc0000; text-decoration: none;
      padding: 6px 8px; border-radius: 6px;
      background: #fff5f5; border: 1px solid #fcc;
      transition: background .15s; word-break: break-word;
      min-height: 36px;
    }
    .yt-link:hover, .yt-link:active { background: #ffe0e0; }
    .yt-icon { flex-shrink: 0; width: 16px; height: 16px; }

    #map { flex: 1; z-index: 0; }
    #dayList { transition: opacity 0.18s; }
    #dayList.fading { opacity: 0; pointer-events: none; }

    .lf-popup .popup-title  { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
    .lf-popup .popup-day    { font-size: 11px; color: #fff; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 7px; }
    .lf-popup .popup-desc   { font-size: 12px; color: #444; margin-bottom: 8px; line-height: 1.55; }
    .lf-popup .popup-warn   { font-size: 11px; color: #c0392b; background: #fef0ef; border-radius: 4px; padding: 4px 7px; margin-bottom: 7px; }
    .lf-popup .popup-pair   { font-size: 11px; color: #1e8449; background: #eafaf1; border-radius: 4px; padding: 4px 7px; margin-bottom: 7px; }
    .lf-popup .popup-secret { font-size: 11px; color: #7d3c98; background: #f5eef8; border-radius: 4px; padding: 4px 7px; margin-bottom: 7px; }
    .lf-popup .popup-yt     { display: flex; flex-direction: column; gap: 5px; }
    .lf-popup .popup-yt a   {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #cc0000; text-decoration: none;
      padding: 5px 8px; border-radius: 5px;
      background: #fff5f5; border: 1px solid #fcc;
    }
    .lf-popup .popup-yt a:hover { background: #ffe0e0; }

    .map-legend {
      position: absolute; bottom: 28px; right: 10px; z-index: 1000;
      background: white; border-radius: 8px; padding: 10px 13px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2); font-size: 11px; max-width: 200px;
    }
    .legend-title { font-weight: 700; margin-bottom: 6px; font-size: 12px; }
    .legend-item  { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .legend-dot   { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-sep   { border-top: 1px dashed #ddd; margin: 5px 0; font-size: 10px; color: #999; }

    .hotel-strip { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
    .hotel-chip  { background: white; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.2); white-space: nowrap; }
    .hotel-chip.h1 { border-left: 4px solid #e74c3c; color: #c0392b; }
    .hotel-chip.h2 { border-left: 4px solid #8e44ad; color: #6c3483; }
    .hotel-chip.h3 { border-left: 4px solid #16a085; color: #00695c; }

    /* ════ MOBILE ≤767px ════ */
    @media (max-width: 767px) {
      header { padding: 8px 12px; }
      header h1 { font-size: 13px; }
      header p  { font-size: 10px; }
      .header-badges { display: none; }
      .ver-btn { font-size: 11px; padding: 4px 12px; }

      .main { flex-direction: column; }
      #map { flex: none; height: 47vh; width: 100%; }
      #sidebar {
        width: 100%; min-width: unset; flex: 1;
        border-right: none; border-top: 2px solid #ddd;
        overflow-y: auto; -webkit-overflow-scrolling: touch;
      }
      #sidebar::before {
        content: ''; display: block;
        width: 40px; height: 4px; background: #ccc; border-radius: 2px;
        margin: 8px auto 4px;
      }
      .filter-bar {
        flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
        padding: 8px 12px; gap: 6px; scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-bar button { padding: 6px 14px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }

      .day-header { padding: 12px 14px; min-height: 52px; }
      .day-title strong { font-size: 14px; }
      .spot-card { padding: 12px 13px; margin-bottom: 10px; }
      .spot-card h4 { font-size: 14px; }
      .yt-link { font-size: 12px; padding: 7px 9px; min-height: 40px; }

      .map-legend, .hotel-strip { display: none; }
      .leaflet-popup-content { margin: 12px 14px !important; }
      .lf-popup .popup-title { font-size: 15px; }
      .lf-popup .popup-yt a  { font-size: 12px; padding: 7px 9px; min-height: 38px; }
    }
    @media (max-width: 374px) {
      #map { height: 43vh; }
      header h1 { font-size: 12px; }
    }
  </style>
</head>

// ══════════════════════════════════════════════
//  地圖初始化
// ══════════════════════════════════════════════
const map = L.map('map').setView([43.1, 141.6], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
}).addTo(map);

const polylineGroup = L.layerGroup().addTo(map);
let renderedDayLayers = {};
let currentVersion = 'v1';

// ──────────────────────────────────────────────
//  切換版本
// ──────────────────────────────────────────────
const THEMES = {
  v1: { bg: 'linear-gradient(135deg,#1a6b3c 0%,#2d9b5a 100%)', btnColor: '#1a6b3c', badge: '📍 每天≤2景點', center: [43.1, 141.6], zoom: 8 },
  v2: { bg: 'linear-gradient(135deg,#1a4a8c 0%,#2d72d9 100%)', btnColor: '#1a4a8c', badge: '🔍 冷門秘境版', center: [43.0, 141.8], zoom: 7 }
};

function switchVersion(ver) {
  if (ver === currentVersion) return;
  currentVersion = ver;
  const t = THEMES[ver];

  document.getElementById('mainHeader').style.background = t.bg;
  document.getElementById('versionBadge').textContent = t.badge;
  document.getElementById('btnV1').classList.toggle('active', ver === 'v1');
  document.getElementById('btnV2').classList.toggle('active', ver === 'v2');
  document.getElementById('btnV1').style.color = ver === 'v1' ? t.btnColor : '';
  document.getElementById('btnV2').style.color = ver === 'v2' ? t.btnColor : '';

  const dayList = document.getElementById('dayList');
  dayList.classList.add('fading');
  setTimeout(() => {
    renderVersion(ver === 'v1' ? DAYS_V1 : DAYS_V2);
    map.flyTo(t.center, t.zoom, { duration: 1.1 });
    dayList.classList.remove('fading');
  }, 180);
}

// ──────────────────────────────────────────────
//  清除 + 重新渲染
// ──────────────────────────────────────────────
function renderVersion(days) {
  // 清除地圖圖層
  Object.values(renderedDayLayers).forEach(l => map.removeLayer(l));
  renderedDayLayers = {};
  polylineGroup.clearLayers();

  // 清除地圖覆蓋層
  document.querySelectorAll('.map-legend, .hotel-strip').forEach(el => el.remove());

  // 清除 sidebar
  document.getElementById('dayList').innerHTML = '';

  // 清除 filter 按鈕（保留「全部」）
  const filterBar = document.getElementById('filterBar');
  while (filterBar.children.length > 1) filterBar.removeChild(filterBar.lastChild);
  filterBar.children[0].classList.add('active');

  buildDays(days);
}

// ──────────────────────────────────────────────
//  建立所有天的地圖 + sidebar
// ──────────────────────────────────────────────
function buildDays(days) {
  const filterBar = document.getElementById('filterBar');
  const dayListEl = document.getElementById('dayList');

  days.forEach(d => {
    const layer = L.layerGroup().addTo(map);
    renderedDayLayers[d.day] = layer;
    const coords = [];

    // Filter 按鈕
    const btn = document.createElement('button');
    btn.textContent = `D${d.day}`;
    btn.dataset.day = d.day;
    btn.style.cssText = `background:${d.color};color:#fff;`;
    filterBar.appendChild(btn);

    // Day block
    const block = document.createElement('div');
    block.className = 'day-block';
    block.id = `day-block-${d.day}`;
    block.innerHTML = `
      <div class="hotel-change ${d.hotelTag}"><span>${d.hotelLabel}</span></div>
      <div class="day-header" onclick="toggleDay(${d.day})">
        <div class="day-badge" style="background:${d.color}">D${d.day}</div>
        <div class="day-title">
          <strong>${d.label}</strong>
          <span>${d.date}</span>
        </div>
        <span class="spot-count" style="background:${d.color}">${d.spotCount}</span>
        <span class="day-chevron">▶</span>
      </div>
      <div class="day-spots" id="spots-${d.day}"></div>
    `;
    dayListEl.appendChild(block);
    const spotsEl = document.getElementById(`spots-${d.day}`);

    d.spots.forEach(s => {
      coords.push([s.lat, s.lng]);

      // 地圖 marker
      const marker = L.marker([s.lat, s.lng], { icon: makeIcon(d.color, s.icon) });
      const ytPopup     = s.videos.map(v => `<a href="${v.url}" target="_blank">${ytSvg()} ${v.title}</a>`).join('');
      const warnPopup   = s.warn   ? `<div class="popup-warn">${s.warn}</div>`     : '';
      const pairPopup   = s.pair   ? `<div class="popup-pair">${s.pair}</div>`     : '';
      const secretPopup = s.secret ? `<div class="popup-secret">${s.secret}</div>` : '';
      marker.bindPopup(`
        <div class="lf-popup" style="min-width:220px;max-width:280px">
          <div class="popup-title">${s.icon} ${s.name}</div>
          <div class="popup-day" style="background:${d.color}">D${d.day} ${d.date}</div>
          <div class="popup-desc">${s.desc}</div>
          ${secretPopup}${pairPopup}${warnPopup}
          <div class="popup-yt">${ytPopup}</div>
        </div>`, { maxWidth: 300 });
      marker.addTo(layer);

      // Sidebar 卡片
      const card = document.createElement('div');
      card.className = 'spot-card';
      card.style.borderLeftColor = d.color;
      const warnCard   = s.warn   ? `<span class="warn">${s.warn}</span>`     : '';
      const pairCard   = s.pair   ? `<span class="pair">${s.pair}</span>`     : '';
      const secretCard = s.secret ? `<span class="secret">${s.secret}</span>` : '';
      const ytLinks    = s.videos.map(v => `<a class="yt-link" href="${v.url}" target="_blank">${ytSvg()} ${v.title}</a>`).join('');
      card.innerHTML = `<h4>${s.icon} ${s.name}</h4><p>${s.desc}</p>${secretCard}${pairCard}${warnCard}<div class="yt-links">${ytLinks}</div>`;
      card.addEventListener('click', e => {
        if (e.target.tagName === 'A' || e.target.closest('a')) return;
        document.getElementById(`day-block-${d.day}`).classList.add('open');
        map.flyTo([s.lat, s.lng], 13, { duration: 1.2 });
        marker.openPopup();
      });
      spotsEl.appendChild(card);
    });

    if (coords.length > 1) {
      L.polyline(coords, { color: d.color, weight: 3, opacity: 0.75, dashArray: '8,5' }).addTo(polylineGroup);
    }
  });

  // 跨天連線（灰色虛線）
  for (let i = 0; i < days.length - 1; i++) {
    const from = days[i].spots[days[i].spots.length - 1];
    const to   = days[i+1].spots[0];
    L.polyline([[from.lat, from.lng],[to.lat, to.lng]], { color: '#bbb', weight: 2, opacity: 0.55, dashArray: '4,8' }).addTo(polylineGroup);
  }

  // 圖例
  const leg = document.createElement('div');
  leg.className = 'map-legend';
  leg.innerHTML = `<div class="legend-title">📅 ${currentVersion === 'v1' ? 'V1 熱門版' : 'V2 秘境版'}</div>` +
    days.map(d => `<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span>D${d.day} ${d.label}</span></div>`).join('') +
    `<div class="legend-sep">── 住宿（換2次）</div>
     <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div><span>① 富良野 (D1-D3)</span></div>
     <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div><span>② 札幌 (D4-D5)</span></div>
     <div class="legend-item"><div class="legend-dot" style="background:#16a085"></div><span>③ 洞爺湖 (D6-D7)</span></div>`;
  document.getElementById('map').appendChild(leg);

  // 飯店標籤列
  const strip = document.createElement('div');
  strip.className = 'hotel-strip';
  strip.innerHTML = `
    <div class="hotel-chip h1">🏨① 富良野 D1-D3</div>
    <div class="hotel-chip h2">🏨② 札幌 D4-D5</div>
    <div class="hotel-chip h3">🏨③ 洞爺湖 D6-D7</div>`;
  document.getElementById('map').appendChild(strip);

  // 預設展開第一天
  document.getElementById('day-block-1').classList.add('open');
}

// ──────────────────────────────────────────────
//  工具函式
// ──────────────────────────────────────────────
function makeIcon(color, emoji) {
  return L.divIcon({
    className: '',
    html: `<div style="width:36px;height:36px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;">${emoji}</div>`,
    iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-22]
  });
}
function ytSvg() {
  return `<svg class="yt-icon" viewBox="0 0 24 24" fill="#cc0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>`;
}
function toggleDay(day) {
  document.getElementById(`day-block-${day}`).classList.toggle('open');
}

// ──────────────────────────────────────────────
//  Filter 事件
// ──────────────────────────────────────────────
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const day = btn.dataset.day;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const days = currentVersion === 'v1' ? DAYS_V1 : DAYS_V2;
  if (day === 'all') {
    Object.values(renderedDayLayers).forEach(l => map.addLayer(l));
    const t = THEMES[currentVersion];
    map.flyTo(t.center, t.zoom, { duration: 1 });
    document.querySelectorAll('.day-block').forEach(b => b.classList.remove('open'));
    document.getElementById('day-block-1').classList.add('open');
  } else {
    Object.entries(renderedDayLayers).forEach(([dd, l]) => day === dd ? map.addLayer(l) : map.removeLayer(l));
    const d = days.find(x => x.day == day);
    if (d) {
      const mid = d.spots[Math.floor(d.spots.length / 2)];
      map.flyTo([mid.lat, mid.lng], 11, { duration: 1 });
    }
    document.querySelectorAll('.day-block').forEach(b => b.classList.remove('open'));
    const t = document.getElementById(`day-block-${day}`);
    if (t) t.classList.add('open');
  }
});

// ──────────────────────────────────────────────
//  初始化（載入 V1）
// ──────────────────────────────────────────────
document.getElementById('btnV1').style.color = THEMES.v1.btnColor;
renderVersion(DAYS_V1);
</script>
</body>
</html>
